# Shared proxy headers for every location that forwards to the Node app.
# Included from deploy/nginx/quiz.conf — not meant to be used standalone.

proxy_http_version 1.1;

# Standard forwarding headers so the app sees the real client/host/scheme.
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# WebSocket upgrade (critical for Socket.IO). $connection_upgrade is defined
# by the `map` block at the top of quiz.conf: it resolves to "upgrade" for
# real upgrade requests and "close" for everything else, so this same
# location safely serves both plain HTTP and the WebSocket transport.
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
proxy_cache_bypass $http_upgrade;

# A quiz session's WebSocket connection is long-lived (an entire game, easily
# 10+ minutes) — nginx's short defaults (60s) would silently drop it
# mid-game. Generous timeouts here; Socket.IO's own ping/pong keeps the
# connection alive well under these.
proxy_connect_timeout 10s;
proxy_send_timeout 3600s;
proxy_read_timeout 3600s;
