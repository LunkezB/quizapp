# Example nginx site config for QuizApp. Hosting-agnostic: drop this file
# into /etc/nginx/conf.d/quiz.conf (or /etc/nginx/sites-available/quiz.conf
# + symlink into sites-enabled/) — both layouts include it inside the main
# http{} block, which is required for the `map` directive below. Also copy
# proxy-common.conf to /etc/nginx/snippets/proxy-common.conf (referenced
# below by absolute path — nginx resolves relative `include` paths against
# its own config root, not this file's directory, so a relative include here
# would silently look in the wrong place).
#
# Replace every occurrence of "quiz.example.com" with your real domain
# before use. See deploy/DEPLOY.md for the full setup + certbot steps.

# Resolves the Connection header per-request: "upgrade" for real WebSocket
# upgrade requests (Socket.IO), "close" for everything else. Must live in
# http{} context — see note above about file layout.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Named upstream instead of a bare IP:port so proxy_pass below never has a
# URI component. This is deliberate: `proxy_pass http://upstream/;` (or any
# proxy_pass with a trailing path) makes nginx REWRITE the forwarded path by
# stripping the location's prefix — an easy source of subtly-broken
# requests. `proxy_pass http://upstream;` with no path at all instead
# forwards the original request URI byte-for-byte, for every location below.
upstream quizapp_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Plain HTTP (port 80).
#
# Serves the app directly over HTTP today. Once you've obtained a
# certificate (see DEPLOY.md), change the two proxy_pass locations below to
# a single `return 301 https://$host$request_uri;` and enable the HTTPS
# server block further down instead — wss:// (the browser's WebSocket
# upgrade of https://) requires TLS, so Socket.IO in production needs this
# switch to actually work over wss://.
server {
    listen 80;
    listen [::]:80;
    server_name quiz.example.com;

    # certbot's HTTP-01 challenge needs this reachable over plain HTTP even
    # after you otherwise redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /socket.io/ {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://quizapp_upstream;
    }

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://quizapp_upstream;
    }
}

# TLS (port 443) — scaffold only, intentionally left commented out.
#
# `nginx -t` must pass without a real certificate on disk, so this block
# stays inactive until you've actually run certbot and filled in the
# domain. To enable: uncomment the whole block, replace quiz.example.com,
# confirm the two ssl_certificate* paths exist, then reload nginx.
